{{ partial "header.html" . }}

{{if .Site.Params.cover}}
<header class="main-header " style="background-image: url({{.Site.BaseURL}}{{.Site.Params.cover}})">

{{else}}
<header class="main-header no-cover">
{{end}}

        {{ if .Site.Menus.main }}

        {{else}}
            {{ if .Site.Params.RSSLink}}
              <a class="menu-button icon-feed" href="{{.Site.Params.RSSLink }}">&nbsp;&nbsp;Subscribe</a>

            {{end}}

<div class="vertical">
        <div class="main-header-content inner">
            <h1 class="page-title">
              <a style="color:white" class="btn-bootstrap-2 title-scroll" href="#content">{{ .Site.Title }}</a>

          </h1>
          <h2 style = "color:white"  class="page-description">{{ .Site.Params.description }}</h2>
        </div>
</div>
    <a class="scroll-down icon-arrow-left" href="#content"><span class="hidden">Scroll Down</span></a>
</header>
<a style="color:white" class="btn-bootstrap-2 title-scroll" href="#content">{{ .Site.Title }}</a>
<main id="content" class="content" role="main">

    {{.Content}}{{ .Site.Params.about }}
      Hello!

</main>
